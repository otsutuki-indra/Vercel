<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HellCrop - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0d0d0d 100%);
            color: #e5e5e5;
            line-height: 1.6;
            overflow: hidden;
            min-height: 100vh;
        }

        /* Background Animation */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            opacity: 0.05;
            animation: float 15s infinite ease-in-out;
        }

        .bubble1 {
            width: 400px;
            height: 400px;
            background: #2a5f2a;
            top: -100px;
            right: -50px;
            animation-delay: 0s;
        }

        .bubble2 {
            width: 300px;
            height: 300px;
            background: #4a4a4a;
            bottom: -50px;
            left: -100px;
            animation-delay: -5s;
        }

        .bubble3 {
            width: 250px;
            height: 250px;
            background: #1a1a2e;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(30px);
            }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Gradient Border Effect */
        .login-wrapper {
            position: relative;
            width: 100%;
            max-width: 420px;
        }

        .gradient-border {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #2a5f2a 0%, #4a4a4a 50%, #2a5f2a 100%);
            border-radius: 16px;
            padding: 1px;
            opacity: 0;
            animation: gradientFlow 3s ease infinite;
        }

        @keyframes gradientFlow {
            0%, 100% {
                opacity: 0.2;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* Login Card */
        .login-card {
            position: relative;
            background: linear-gradient(135deg, rgba(20, 20, 20, 0.95) 0%, rgba(30, 30, 30, 0.95) 100%);
            border: 1px solid rgba(42, 95, 42, 0.3);
            border-radius: 16px;
            padding: 3rem 2.5rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            animation: slideInUp 0.8s ease-out;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #2a5f2a 50%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* Title */
        .login-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: #999;
            text-align: center;
            margin-bottom: 2rem;
        }

        /* Form */
        .form-group {
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.8s ease-out backwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #ddd;
            margin-bottom: 0.6rem;
        }

        input {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s;
            outline: none;
        }

        input::placeholder {
            color: #777;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(42, 95, 42, 0.5);
            box-shadow: 0 0 20px rgba(42, 95, 42, 0.1);
        }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            padding: 0;
            cursor: pointer;
            accent-color: #2a5f2a;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            color: #999;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 1.5rem;
        }

        .forgot-password a {
            font-size: 0.85rem;
            color: #2a5f2a;
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 600;
        }

        .forgot-password a:hover {
            color: #3d7f3d;
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #2a5f2a 0%, #3d7f3d 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out 0.4s backwards;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(42, 95, 42, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:hover::before {
            left: 100%;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0;
            opacity: 0.5;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider-text {
            font-size: 0.85rem;
            color: #888;
            white-space: nowrap;
        }

        /* Social Buttons */
        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .social-btn {
            padding: 0.9rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .social-btn:hover {
            background: rgba(42, 95, 42, 0.2);
            border-color: rgba(42, 95, 42, 0.5);
            transform: translateY(-2px);
        }

        /* Signup Link */
        .signup-link {
            text-align: center;
            font-size: 0.9rem;
            color: #999;
            animation: fadeInUp 0.8s ease-out 0.5s backwards;
        }

        .signup-link a {
            color: #2a5f2a;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s;
        }

        .signup-link a:hover {
            color: #3d7f3d;
        }

        /* Security Badge */
        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #777;
            text-align: center;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
            }

            .logo {
                font-size: 1.8rem;
            }

            .login-title {
                font-size: 1.5rem;
            }

            .social-login {
                grid-template-columns: 1fr;
            }

            input {
                padding: 0.8rem 0.9rem;
            }
        }

        /* Loading State */
        .login-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation">
        <div class="bubble bubble1"></div>
        <div class="bubble bubble2"></div>
        <div class="bubble bubble3"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div class="login-wrapper">
            <div class="gradient-border"></div>
            
            <div class="login-card">
                <!-- Logo Section -->
                <div class="logo-section">
                    <div class="logo">HellCrop</div>
                    <div class="tagline">Growth Platform</div>
                </div>

                <!-- Title -->
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Sign in to grow your crop</p>

                <!-- Form -->
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="your@email.com" 
                            required
                        >
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password" 
                            required
                        >
                    </div>

                    <!-- Remember Me -->
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember me</label>
                    </div>

                    <!-- Forgot Password -->
                    <div class="forgot-password">
                        <a href="#">Forgot Password?</a>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="login-btn">Sign In</button>
                </form>

                <!-- Divider -->
                <div class="divider">
                    <div class="divider-line"></div>
                    <div class="divider-text">or continue with</div>
                    <div class="divider-line"></div>
                </div>

                <!-- Social Login -->
                <div class="social-login">
                    <button class="social-btn" onclick="alert('Google login coming soon')">
                        <span>🔵</span> Google
                    </button>
                    <button class="social-btn" onclick="alert('GitHub login coming soon')">
                        <span>⚫</span> GitHub
                    </button>
                </div>

                <!-- Signup Link -->
                <div class="signup-link">
                    Don't have an account? <a href="#">Create one</a>
                </div>

                <!-- Security Badge -->
                <div class="security-badge">
                    🔒 Bank-Grade Security • GDPR Compliant
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = event.target.querySelector('.login-btn');
            
            // Add loading state
            loginBtn.classList.add('loading');
            loginBtn.innerHTML = '<span class="spinner"></span>Signing In...';
            
            // Simulate API call
            setTimeout(() => {
                if (email && password) {
                    alert(`Welcome back! 🎉\n\nLogging in as: ${email}\n\n(Dashboard coming soon)`);
                    loginBtn.classList.remove('loading');
                    loginBtn.innerHTML = 'Sign In';
                    document.getElementById('loginForm').reset();
                } else {
                    alert('Please fill in all fields');
                    loginBtn.classList.remove('loading');
                    loginBtn.innerHTML = 'Sign In';
                }
            }, 1500);
        }

        // Add enter key support
        document.getElementById('loginForm').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin(e);
            }
        });

        // Focus effect on inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.style.borderColor = 'rgba(42, 95, 42, 0.8)';
            });
            input.addEventListener('blur', function() {
                this.style.borderColor = 'rgba(255, 255, 255, 0.1)';
            });
        });
    </script>
</body>
</html>

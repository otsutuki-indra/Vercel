<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HellCrop - Sign In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0d0d0d 100%);
            color: #e5e5e5;
            line-height: 1.6;
            min-height: 100vh;
            overflow-y: auto;
        }
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; pointer-events: none; z-index: 0;
        }
        .bubble {
            position: absolute; border-radius: 50%; opacity: 0.06;
            animation: float 18s infinite ease-in-out;
        }
        .bubble1 { width: 420px; height: 420px; background: #2a5f2a; top: -120px; right: -80px; }
        .bubble2 { width: 320px; height: 320px; background: #4a4a4a; bottom: -80px; left: -120px; animation-delay: -6s; }
        .bubble3 { width: 280px; height: 280px; background: #1a2e1a; top: 40%; left: 60%; animation-delay: -12s; }
        @keyframes float { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(40px) rotate(8deg); } }

        .container { position: relative; z-index: 10; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .login-wrapper { position: relative; width: 100%; max-width: 420px; margin: 40px 0; }
        .gradient-border {
            position: absolute; inset: 0;
            background: linear-gradient(135deg, #2a5f2a 0%, #4a4a4a 50%, #2a5f2a 100%);
            border-radius: 16px; padding: 2px; animation: gradientFlow 4s ease infinite;
        }
        @keyframes gradientFlow { 0%,100% { opacity: 0.25; } 50% { opacity: 0.6; } }

        .login-card {
            position: relative; background: linear-gradient(135deg, rgba(20,20,20,0.96) 0%, rgba(30,30,30,0.96) 100%);
            border: 1px solid rgba(42,95,42,0.35); border-radius: 16px; padding: 3rem 2.5rem;
            backdrop-filter: blur(20px); box-shadow: 0 25px 70px rgba(0,0,0,0.5);
            animation: cardPop 0.9s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes cardPop { from { opacity: 0; transform: scale(0.88) translateY(60px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .logo-section { text-align: center; margin-bottom: 2.5rem; }
        .logo {
            font-size: 2.5rem; font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #2a5f2a 50%, #fff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -1.5px;
        }
        .tagline { 
            font-size: 0.9rem; color: #888; letter-spacing: 4px; 
            font-weight: 600; margin-top: 8px; 
        }

        .login-title { 
            font-size: 1.9rem; font-weight: 700; text-align: center; 
            margin-bottom: 0.5rem; 
        }
        .login-subtitle { 
            font-size: 0.95rem; color: #999; text-align: center; 
            margin-bottom: 2.3rem; 
        }

        .form-group { margin-bottom: 1.7rem; }
        label { 
            display: block; font-size: 0.93rem; font-weight: 600; 
            color: #ddd; margin-bottom: 0.7rem; 
        }
        input {
            width: 100%; padding: 1rem 1.1rem; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff;
            font-size: 0.98rem; transition: all 0.3s ease;
        }
        input:focus {
            background: rgba(255,255,255,0.09); border-color: #2a5f2a;
            box-shadow: 0 0 0 4px rgba(42,95,42,0.15);
        }

        .login-btn {
            width: 100%; padding: 1.1rem; background: linear-gradient(135deg, #2a5f2a 0%, #3d7f3d 100%);
            color: #fff; border: none; border-radius: 8px; font-size: 1.05rem; font-weight: 700;
            cursor: pointer; letter-spacing: 1px; margin-top: 0.8rem;
        }
        .login-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(42,95,42,0.45); }

        .signup-link { 
            text-align: center; font-size: 0.95rem; color: #999; 
            margin-top: 2.6rem; 
        }
        .signup-link a { color: #3d7f3d; font-weight: 700; text-decoration: none; }
        .signup-link a:hover { color: #2a5f2a; text-decoration: underline; }

        /* --- Social Links Section added below --- */
        .social-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .social-link {
            width: 44px;
            height: 44px;
            border: 1.2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: transparent;
        }
        .social-link svg {
            width: 18px;
            height: 18px;
            fill: #ffffff;
        }
        .social-link:hover {
            border-color: #3d7f3d;
            background: rgba(42, 95, 42, 0.1);
            transform: translateY(-5px);
        }

        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; border-radius: 16px; }
        .particle { position: absolute; width: 4px; height: 4px; background: #2a5f2a; border-radius: 50%; animation: particleFloat 8s linear infinite; opacity: 0.3; }
        @keyframes particleFloat { 0% { transform: translateY(0) scale(1); opacity: 0.4; } 100% { transform: translateY(-300px) scale(0); opacity: 0; } }

        .footer { 
            position: relative; text-align: center; font-size: 0.82rem; 
            color: #666; padding: 2.5rem 1rem 2rem; margin-top: 2rem; 
        }
        .footer a { color: #888; text-decoration: none; margin: 0 12px; }
        .footer a:hover { color: #3d7f3d; }
    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="bubble bubble1"></div>
        <div class="bubble bubble2"></div>
        <div class="bubble bubble3"></div>
    </div>

    <div class="container">
        <div class="login-wrapper">
            <div class="gradient-border"></div>
            
            <div class="login-card">
                <div class="logo-section">
                    <div class="logo">ᎻᎬᏞᏞᏟᎡᎾᏢ</div>
                    <div class="tagline">GROWTH PLATFORM</div>
                </div>

                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Sign in to continue growing</p>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="login-btn">Sign In</button>
                </form>

                <div class="signup-link">
                    Don't have an account? 
                    <a href="signup.html" id="createNew">Create new</a>
                </div>

                <div class="social-container">
                    <a href="#" class="social-link">
                        <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                    </a>
                    <a href="#" class="social-link">
                        <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                    </a>
                    <a href="#" class="social-link">
                        <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849s-.011 3.584-.069 4.849c-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07s-3.584-.012-4.849-.07c-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849s.012-3.584.07-4.849c.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12s.014 3.667.072 4.947c.2 4.353 2.612 6.777 6.973 6.977 1.28.057 1.688.072 4.947.072s3.667-.015 4.947-.072c4.351-.2 6.777-2.62 6.977-6.977.058-1.28.072-1.688.072-4.947s-.015-3.667-.072-4.947c-.2-4.349-2.612-6.778-6.977-6.977C15.667.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
                    </a>
                    <a href="#" class="social-link">
                        <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854V15.469H7.078v-3.396h3.047V9.445c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.396h-2.796v8.458C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        © 2026 HellCrop. All rights reserved.<br>
        <a href="index.html">Home</a> • 
        <a href="policy.html">Privacy Policy</a> • 
        <a href="terms.html">Terms of Use</a>
    </div>

    <script>
        function createParticles() {
            const card = document.querySelector('.login-card');
            const particlesContainer = document.createElement('div');
            particlesContainer.className = 'particles';
            card.appendChild(particlesContainer);
            for(let i = 0; i < 25; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * -8 + 's';
                p.style.animationDuration = (Math.random() * 6 + 7) + 's';
                particlesContainer.appendChild(p);
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            const btn = event.target.querySelector('.login-btn');
            btn.innerHTML = 'Signing In...';
            btn.disabled = true;

            setTimeout(() => {
                alert("✔ Login Successful!\n\nRedirecting to dashboard...");
                window.location.href = "index.html";
            }, 1400);
        }

        document.getElementById('createNew').addEventListener('click', (e) => {
            // Keep original behavior as per your code
            window.location.href = 'signup.html';
        });

        window.onload = () => createParticles();
    </script>
</body>
</html>

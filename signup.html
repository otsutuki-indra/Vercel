<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HellCrop - Create Account</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0d0d0d 100%);
            color: #e5e5e5; min-height: 100vh; display: flex; flex-direction: column;
        }
        .bg-animation { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
        .bubble { position: absolute; border-radius: 50%; opacity: 0.05; animation: float 20s infinite ease-in-out; }
        .bubble1 { width: 400px; height: 400px; background: #2a5f2a; top: -100px; left: -100px; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(40px); } }

        .container { position: relative; z-index: 10; flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .card {
            background: rgba(20,20,20,0.95); border: 1px solid rgba(42,95,42,0.3);
            border-radius: 16px; padding: 3rem; width: 100%; max-width: 450px;
            backdrop-filter: blur(15px); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .logo { font-size: 2.2rem; font-weight: 900; text-align: center; margin-bottom: 2rem;
                background: linear-gradient(135deg, #fff, #2a5f2a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #aaa; }
        input { width: 100%; padding: 0.9rem; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 8px; color: #fff; }
        input:focus { border-color: #2a5f2a; outline: none; }
        .btn { width: 100%; padding: 1rem; background: #2a5f2a; color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 1rem; }
        .btn:hover { background: #3d7f3d; }
        .switch { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #777; }
        .switch a { color: #3d7f3d; text-decoration: none; font-weight: 600; }

        .footer { width: 100%; padding: 3rem 1rem; display: flex; justify-content: center; align-items: center; }
        .footer-inner { display: flex; align-items: center; gap: 15px; color: #666; font-size: 0.82rem; flex-wrap: wrap; justify-content: center; }
        .footer-inner a { color: #888; text-decoration: none; transition: 0.3s; }
        .footer-inner a:hover { color: #3d7f3d; }
        .footer-socials { display: flex; gap: 15px; align-items: center; margin-left: 10px; padding-left: 15px; border-left: 1px solid #333; }
        .footer-socials svg { width: 16px; height: 16px; fill: #666; transition: 0.3s; }
        .footer-socials a:hover svg { fill: #e5e5e5; }
    </style>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>
    <div class="bg-animation"><div class="bubble bubble1"></div></div>
    <div class="container">
        <div class="card">
            <div class="logo">ᎻᎬᏞᏞᏟᎡᎾᏢ</div>
            <form>
                <div class="form-group"><label>Full Name</label><input type="text" placeholder="example name"></div>
                <div class="form-group"><label>Email</label><input type="email" placeholder="example@domain.com"></div>
                <div class="form-group"><label>Password</label><input type="password" placeholder="••••••••"></div>
                <button type="submit" class="btn">Create Account</button>
            </form>
            <div class="switch">Already have an account? <a href="signin.html">Sign In</a></div>
        </div>
    </div>

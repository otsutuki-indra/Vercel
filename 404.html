<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | HellCrop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0d0d0d 100%);
            color: #e5e5e5; min-height: 100vh; display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* Background Animation */
        .bg-animation { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
        .bubble { position: absolute; border-radius: 50%; opacity: 0.05; animation: float 15s infinite ease-in-out; }
        .bubble1 { width: 450px; height: 450px; background: #2a5f2a; top: -100px; right: -50px; }
        .bubble2 { width: 300px; height: 300px; background: #4a4a4a; bottom: -50px; left: -50px; animation-delay: -5s; }
        @keyframes float { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(40px) scale(1.05); } }

        .container { position: relative; z-index: 10; flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        
        .error-card {
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(42, 95, 42, 0.3);
            border-radius: 20px;
            padding: 4rem 2rem;
            width: 100%;
            max-width: 500px;
            text-align: center;
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
        }

        /* Glitch Effect for 404 */
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 1rem;
            position: relative;
            background: linear-gradient(135deg, #fff, #2a5f2a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }

        .error-message {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .error-desc {
            color: #888;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .btn-home {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: #2a5f2a;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-home:hover {
            background: #3d7f3d;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(42, 95, 42, 0.3);
        }

        /* Footer Style */
        .footer { width: 100%; padding: 2rem; display: flex; justify-content: center; }
        .footer-inner { display: flex; align-items: center; gap: 15px; color: #444; font-size: 0.8rem; }
        .logo-small { font-weight: 900; color: #2a5f2a; letter-spacing: 1px; }
    </style>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>
    <div class="bg-animation">
        <div class="bubble bubble1"></div>
        <div class="bubble bubble2"></div>
    </div>

    <div class="container">
        <div class="error-card">
            <div class="error-code">404</div>
            <h1 class="error-message">Lost in the Crop?</h1>
            <p class="error-desc">The page you are looking for has been harvested or moved to a different field.</p>
            <a href="index.html" class="btn-home">Back to Home</a>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-inner">
            <span class="logo-small">ᎻᎬᏞᏞᏟᎡᎾᏢ</span>
            <span>|</span>
            <span>System Status: Operational</span>
        </div>
    </footer>
</body>
</html>

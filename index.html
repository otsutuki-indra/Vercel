<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X.CROP | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg: #020617; }
        body { background-color: var(--bg); font-family: 'Space Grotesk', sans-serif; cursor: none; overflow: hidden; color: #94a3b8; }
        
        /* Geometry Cursor */
        #cursor { width: 24px; height: 24px; border: 1px solid var(--primary); position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.15s ease-out; transform: rotate(45deg); }
        #cursor-dot { width: 4px; height: 4px; background: white; position: fixed; pointer-events: none; z-index: 9999; border-radius: 50%; }

        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 28px; }
        .hidden { display: none !important; }
        
        input { background: rgba(255, 255, 255, 0.04) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        input:focus { border-color: var(--primary) !important; outline: none; box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }

        .neon-btn { transition: 0.4s; position: relative; overflow: hidden; }
        .neon-btn:hover { background: var(--primary); color: white; box-shadow: 0 0 25px rgba(59, 130, 246, 0.4); transform: translateY(-2px); }

        .grid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="cursor-dot"></div>
    <div class="grid-bg"></div>

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass w-full max-w-md p-12 shadow-2xl relative">
            <div class="text-4xl font-bold text-white tracking-tighter mb-1 text-center italic">X<span class="text-blue-500">.</span>CROP</div>
            <p class="text-center text-[9px] uppercase tracking-[0.6em] text-slate-600 mb-12 font-bold italic">Neural_Link_Established</p>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[9px] font-bold uppercase tracking-widest ml-1 text-slate-500">Node_Identity</label>
                    <input type="email" id="email" placeholder="EMAIL_ADDR" class="w-full mt-2 p-4 rounded-xl text-xs font-bold">
                </div>
                <div>
                    <label class="text-[9px] font-bold uppercase tracking-widest ml-1 text-slate-500">Security_Phrase</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full mt-2 p-4 rounded-xl text-xs font-bold">
                </div>
                
                <div class="flex flex-col gap-3 pt-4">
                    <button onclick="handleAuth('login')" class="neon-btn w-full bg-blue-600 text-white font-black py-4 rounded-xl tracking-widest text-[10px]">INITIALIZE_LOGIN</button>
                    <button onclick="handleAuth('signup')" class="w-full bg-white/5 hover:bg-white/10 text-white font-bold py-4 rounded-xl border border-white/5 transition text-[10px] tracking-widest">REGISTER_NODE</button>
                </div>
            </div>
            <p id="auth-msg" class="mt-8 text-center text-[10px] font-bold text-blue-400 uppercase tracking-widest h-4"></p>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden flex h-screen">
        <aside class="w-80 bg-[#010409] border-r border-white/5 p-10 flex flex-col">
            <div class="text-2xl font-black text-white italic mb-20 tracking-tighter">X.CROP</div>
            <nav class="flex-grow space-y-4">
                <div class="p-4 glass border-blue-500/30 text-white text-[10px] font-bold tracking-widest">CORE_DASHBOARD</div>
                <div class="p-4 hover:bg-white/5 rounded-2xl transition text-[10px] font-bold tracking-widest">FLUX_REVENUE</div>
                <div class="p-4 hover:bg-white/5 rounded-2xl transition text-[10px] font-bold tracking-widest">SECURITY_LOGS</div>
            </nav>
            <div class="mt-auto border-t border-white/5 pt-8">
                <p class="text-[8px] uppercase tracking-widest text-slate-600 mb-2 font-black">Authorized_Node</p>
                <div id="display-email" class="text-[11px] font-bold text-blue-400 truncate italic mb-6">syncing...</div>
                <button onclick="handleLogout()" class="w-full p-4 text-[9px] font-black text-red-500 bg-red-500/5 border border-red-500/10 rounded-2xl hover:bg-red-500/10 transition tracking-widest">TERMINATE_SESSION</button>
            </div>
        </aside>

        <main class="flex-grow p-16 overflow-y-auto">
            <header class="mb-20 flex justify-between items-center">
                <div>
                    <h1 class="text-6xl font-black text-white italic tracking-tighter">NEXUS_01</h1>
                    <p class="text-slate-600 text-[10px] font-bold uppercase tracking-[0.4em] mt-4 italic">System_Pulse: <span class="text-emerald-500">Active</span></p>
                </div>
                <div class="glass px-8 py-4 text-[10px] font-bold text-blue-400 border-blue-500/20 tracking-widest uppercase">Stable_Build_v2.6</div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="glass p-12 relative group">
                    <p class="text-[9px] font-black text-slate-600 uppercase tracking-widest mb-6">Liquidity_Pool</p>
                    <div class="text-7xl font-black text-white italic tracking-tighter">$42.8M</div>
                    <div class="mt-8 h-1 w-full bg-white/5 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-600 w-3/4"></div>
                    </div>
                </div>
                <div class="glass p-12 border-blue-500/20">
                    <p class="text-[9px] font-black text-slate-600 uppercase tracking-widest mb-6">Neural_Nodes_Active</p>
                    <div class="text-7xl font-black text-white italic tracking-tighter">1,402</div>
                    <div class="mt-8 flex gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span class="text-[9px] font-bold text-emerald-500 uppercase tracking-widest">Sync_Stable</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // GEOMETRY CURSOR
        const cursor = document.getElementById('cursor');
        const dot = document.getElementById('cursor-dot');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 12 + 'px';
            cursor.style.top = e.clientY - 12 + 'px';
            dot.style.left = e.clientX - 2 + 'px';
            dot.style.top = e.clientY - 2 + 'px';
            cursor.style.transform = `rotate(${e.clientX / 4}deg) scale(${1 + Math.sin(e.clientY/100)*0.1})`;
        });

        // SUPABASE SYNC
        const SB_URL = "https://clyqcgvwgyhjluqdlhqo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNseXFjZ3Z3Z3loamx1cWRsaHFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzg1MTAsImV4cCI6MjA5MDc1NDUxMH0.AV70e71J1YMF5j_Fb7OVpuxVuKqZtv9TkJGqh01DGoA";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('auth-msg');

            if(!email || !password) { msg.innerText = "!! INPUT_REQUIRED !!"; return; }
            msg.innerText = ">> CONNECTING_TO_NEXUS...";

            if(type === 'signup') {
                const { error } = await supabaseClient.auth.signUp({ email, password });
                if(error) msg.innerText = "!! " + error.message.toUpperCase() + " !!";
                else msg.innerText = ">> VERIFICATION_LINK_SENT_TO_INBOX";
            } else {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if(error) msg.innerText = "!! " + error.message.toUpperCase() + " !!";
                else checkUser();
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                document.getElementById('display-email').innerText = user.email;
            }
        }

        checkUser();
    </script>
</body>
</html>

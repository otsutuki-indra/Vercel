<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X.CROP | Alpha </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #3b82f6; --dark: #020617; }
        body { background: var(--dark); font-family: 'Plus Jakarta Sans', sans-serif; cursor: crosshair; overflow: hidden; color: #94a3b8; }
        
        .grid-layer { position: fixed; inset: 0; background-image: radial-gradient(var(--neon) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.1; z-index: -1; }
        #cursor-glow { width: 400px; height: 400px; background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%); position: fixed; pointer-events: none; z-index: -1; transform: translate(-50%, -50%); transition: 0.1s linear; }

        .nexus-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 32px; backdrop-filter: blur(20px); }
        .hidden { display: none !important; }
        
        input { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; transition: 0.3s; }
        input:focus { border-color: var(--neon) !important; box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); outline: none; }

        .btn-access { background: var(--neon); color: white; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; font-size: 11px; transition: 0.4s; }
        .btn-access:hover { box-shadow: 0 0 30px rgba(59, 130, 246, 0.4); transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="grid-layer"></div>
    <div id="cursor-glow"></div>

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="nexus-card w-full max-w-md p-12 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-500 to-transparent opacity-50"></div>
            
            <div class="text-5xl font-black text-white italic mb-2 tracking-tighter">X<span class="text-blue-500">.</span>CROP</div>
            <p class="text-[9px] uppercase tracking-[0.6em] text-slate-600 mb-12 font-bold italic">Identity_Protocol_Active</p>
            
            <div class="space-y-4">
                <input type="email" id="email" placeholder="EMAIL_IDENTITY" class="w-full p-5 rounded-2xl text-xs font-bold uppercase tracking-widest">
                <input type="password" id="password" placeholder="SECRET_PHRASE" class="w-full p-5 rounded-2xl text-xs font-bold uppercase tracking-widest">
                <div class="flex gap-3 pt-6">
                    <button onclick="handleAuth('login')" class="btn-access flex-1 py-5 rounded-2xl shadow-xl shadow-blue-900/20">LOG_IN</button>
                    <button onclick="handleAuth('signup')" class="flex-1 bg-white/5 border border-white/5 py-5 rounded-2xl text-[10px] font-black text-white hover:bg-white/10 transition">REGISTER</button>
                </div>
            </div>
            <p id="feedback" class="mt-8 text-[9px] font-black text-blue-500 uppercase tracking-widest h-4 animate-pulse"></p>
        </div>
    </div>

    <div id="main-interface" class="hidden flex h-screen">
        <aside class="w-80 bg-[#010409] border-r border-white/5 p-10 flex flex-col">
            <div class="text-2xl font-black text-white italic mb-20 tracking-tighter">X.CROP</div>
            <nav class="flex-grow space-y-4">
                <div class="p-4 bg-blue-600/10 border border-blue-500/20 rounded-2xl text-white text-[10px] font-black tracking-widest">CONSOLE_ROOT</div>
                <div class="p-4 opacity-30 text-[10px] font-black tracking-widest cursor-not-allowed">REVENUE_FLUX</div>
                <div class="p-4 opacity-30 text-[10px] font-black tracking-widest cursor-not-allowed">SECURITY_LOGS</div>
            </nav>
            <div class="mt-auto pt-8 border-t border-white/5">
                <div id="user-display" class="text-[10px] font-bold text-blue-400 truncate italic mb-6">CONNECTING...</div>
                <button onclick="logout()" class="w-full p-4 text-[9px] font-black text-red-500 bg-red-500/5 border border-red-500/10 rounded-2xl hover:bg-red-500/10 transition">TERMINATE_NODE</button>
            </div>
        </aside>

        <main class="flex-grow p-20 overflow-y-auto">
            <header class="mb-20">
                <h1 class="text-8xl font-black text-white italic tracking-tighter">CORE_DASH</h1>
                <div class="mt-4 flex items-center gap-3">
                    <span class="w-3 h-3 bg-emerald-500 rounded-full"></span>
                    <p class="text-[10px] font-bold uppercase tracking-[0.5em] text-emerald-500 italic">Access: Authorized_Stable</p>
                </div>
            </header>

            <div class="grid grid-cols-2 gap-10">
                <div class="nexus-card p-14 group">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Liquidity_Pool</p>
                    <div class="text-7xl font-black text-white italic tracking-tighter leading-none group-hover:text-blue-500 transition cursor-default">$42.8M</div>
                </div>
                <div class="nexus-card p-14">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Network_Nodes</p>
                    <div class="text-7xl font-black text-white italic tracking-tighter leading-none cursor-default">1,402</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const glow = document.getElementById('cursor-glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        const SB_URL = "https://clyqcgvwgyhjluqdlhqo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNseXFjZ3Z3Z3loamx1cWRsaHFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzg1MTAsImV4cCI6MjA5MDc1NDUxMH0.AV70e71J1YMF5j_Fb7OVpuxVuKqZtv9TkJGqh01DGoA";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('feedback');

            if(!email || !password) { msg.innerText = "!! ERROR: INPUT_REQUIRED !!"; return; }
            msg.innerText = ">> SYNCING_WITH_NODE...";

            if(type === 'signup') {
                const { error } = await sb.auth.signUp({ email, password });
                if(error) msg.innerText = "!! " + error.message.toUpperCase();
                else msg.innerText = ">> ACCOUNT_CREATED. LOG_IN NOW."; 
            } else {
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if(error) msg.innerText = "!! " + error.message.toUpperCase();
                else checkSession();
            }
        }

        async function logout() { await sb.auth.signOut(); location.reload(); }

        async function checkSession() {
            const { data: { user } } = await sb.auth.getUser();
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-interface').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email.toUpperCase();
            }
        }
        checkSession();
    </script>
</body>
</html>

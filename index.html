<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X.CROP | Secure Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: #94a3b8; }
        .auth-card { background: #0A1128; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2rem; }
        .hidden { display: none; }
        input { background: rgba(255, 255, 255, 0.03) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        .nav-link { padding: 0.75rem 1.25rem; border-radius: 0.75rem; transition: 0.3s; font-size: 13px; font-weight: 600; }
        .nav-link.active { background: #2563eb; color: white; }
    </style>
</head>
<body class="antialiased">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="auth-card w-full max-w-md p-10 shadow-2xl">
            <div class="text-3xl font-black text-white italic mb-2 text-center">X.CROP</div>
            <p class="text-center text-xs uppercase tracking-[0.3em] text-slate-500 mb-10">Access_Terminal_v2</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest ml-1">Work_Email</label>
                    <input type="email" id="email" class="w-full mt-2 p-4 rounded-xl focus:outline-none focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest ml-1">Access_Key</label>
                    <input type="password" id="password" class="w-full mt-2 p-4 rounded-xl focus:outline-none focus:border-blue-500 transition">
                </div>
                <div class="flex gap-4 pt-4">
                    <button onclick="handleAuth('login')" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-blue-900/20">LOGIN</button>
                    <button onclick="handleAuth('signup')" class="flex-1 bg-white/5 hover:bg-white/10 text-white font-bold py-4 rounded-xl border border-white/10 transition">REGISTER</button>
                </div>
            </div>
            <p id="auth-msg" class="mt-6 text-center text-xs font-bold text-blue-400"></p>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden flex h-screen">
        <aside class="w-72 bg-[#0A1128] border-r border-white/5 p-8 flex flex-col">
            <div class="text-2xl font-black text-white italic mb-16">X.CROP</div>
            <nav class="flex-grow space-y-2">
                <a href="#" class="nav-link active block">Console_Home</a>
                <a href="#" class="nav-link block">Revenue_Nodes</a>
                <p class="text-[10px] font-black uppercase tracking-widest text-slate-600 pt-10 mb-4 ml-4">Connected_User</p>
                <div id="display-email" class="text-[11px] font-bold text-blue-400 ml-4 truncate italic">user@x-crop.io</div>
            </nav>
            <button onclick="handleLogout()" class="mt-auto p-4 text-[10px] font-black uppercase tracking-widest text-red-500 bg-red-500/5 border border-red-500/10 rounded-2xl hover:bg-red-500/10 transition">Terminate_Session</button>
        </aside>

        <main class="flex-grow p-12 overflow-y-auto">
            <header class="mb-16">
                <h1 class="text-4xl font-black text-white tracking-tighter italic">NEXUS_CORE</h1>
                <p class="text-slate-500 text-sm mt-2">Status: <span class="text-emerald-500 font-bold uppercase tracking-widest text-[10px]">● Authorized</span></p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="bg-[#0A1128] p-10 rounded-[2.5rem] border border-white/5">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Liquidity</p>
                    <div class="text-4xl font-black text-white italic">$42.8M</div>
                </div>
                <div class="bg-[#0A1128] p-10 rounded-[2.5rem] border border-white/5">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Active_Nodes</p>
                    <div class="text-4xl font-black text-white italic">1,402</div>
                </div>
                <div class="bg-[#0A1128] p-10 rounded-[2.5rem] border border-white/5">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Security</p>
                    <div class="text-4xl font-black text-blue-500 italic">Level_09</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // SUPABASE CONFIG
        const SB_URL = "https://clyqcgvwgyhjluqdlhqo.supabase.co";
        const SB_KEY = "sb_publishable_BX5oJM9oj3R-oQSvKlsvGQ_-Zhnml_7"; // আপনার দেওয়া কি ব্যবহার করলাম
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        // AUTH LOGIC
        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('auth-msg');

            if(!email || !password) { msg.innerText = "Error: Input required"; return; }
            msg.innerText = "Processing_Request...";

            if(type === 'signup') {
                const { data, error } = await supabase.auth.signUp({ email, password });
                if(error) msg.innerText = "Error: " + error.message;
                else msg.innerText = "Success! Now Login.";
            } else {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if(error) msg.innerText = "Error: " + error.message;
                else checkUser();
            }
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            location.reload();
        }

        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                document.getElementById('display-email').innerText = user.email;
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('dashboard-screen').classList.add('hidden');
            }
        }

        checkUser();
    </script>
</body>
</html>

    <script>
        // Supabase Configuration
        const SB_URL = "https://clyqcgvwgyhjluqdlhqo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNseXFjZ3Z3Z3loamx1cWRsaHFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzg1MTAsImV4cCI6MjA5MDc1NDUxMH0.AV70e71J1YMF5j_Fb7OVpuxVuKqZtv9TkJGqh01DGoA";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        // Security Check
        async function checkAccess() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) {
                window.location.href = "/";
            } else {
                document.getElementById('dashboard-body').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email.toUpperCase();
            }
        }

        async function logout() {
            await sb.auth.signOut();
            window.location.href = "/";
        }

        checkAccess();
    </script>

</html>
